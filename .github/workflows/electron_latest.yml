name: Build Dreamz SCADA Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Clear npm cache
      run: npm cache clean --force

    - name: Install build dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -y build-essential unixodbc unixodbc-dev

    - name: Install server dependencies
      run: npm install
      working-directory: ./server

    - name: Install client dependencies
      run: npm install
      working-directory: ./client

    - name: Build client
      run: npm run build -- --configuration=production
      working-directory: ./client

    - name: Install app dependencies
      run: npm install
      working-directory: ./app/electron

    - name: Copy server and client build to app/electron
      run: |
        mkdir -p app/electron/server
        mkdir -p app/electron/client/dist
        cp -r server/. app/electron/server/
        cp -r client/dist/. app/electron/client/dist
      shell: bash

    - name: Install app dependencies for Electron
      run: npx electron-builder install-app-deps
      working-directory: ./app/electron
      env:
        ELECTRON_ARCH: ${{ matrix.arch }}

    - name: Download NSSM
      if: matrix.os == 'windows-latest'
      run: |
        curl -L -o nssm.zip https://nssm.cc/release/nssm-2.24.zip
        unzip -d nssm_tmp nssm.zip
        cp nssm_tmp/nssm-2.24/win64/nssm.exe ./app/electron/
      shell: bash

    - name: Copy NSIS installer script
      if: matrix.os == 'windows-latest'
      run: cp ./dreamz/installer/dreamz-scada-installer.nsi ./app/electron/
      shell: bash

    - name: Set APP_VERSION env variable
      if: matrix.os == 'windows-latest'
      run: |
        node -p "require('./client/package.json').version" > version.txt
        echo "APP_VERSION=$(cat version.txt)" >> $GITHUB_ENV
      working-directory: ./
      shell: bash

    - name: Inject version into NSIS script
      if: matrix.os == 'windows-latest'
      run: |
        sed -i "s/!define APP_VERSION \".*\"/!define APP_VERSION \"${APP_VERSION}\"/" ./app/electron/dreamz-scada-installer.nsi
      shell: bash

    - name: Build NSIS installer
      if: matrix.os == 'windows-latest'
      run: makensis ./app/electron/dreamz-scada-installer.nsi
      shell: bash

    - name: Package for Windows
      if: matrix.os == 'windows-latest' && matrix.arch == 'x64'
      run: npx electron-builder --win nsis --x64
      working-directory: ./app/electron

    - name: Package for Linux
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          npx electron-builder --linux appimage --arm64
        else
          npx electron-builder --linux appimage --${{ matrix.arch }}
        fi
      working-directory: ./app/electron

    - name: Package for macOS
      if: matrix.os == 'macos-latest'
      run: npx electron-builder --mac dmg --${{ matrix.arch }}
      working-directory: ./app/electron

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dist/*.exe artifacts/DreamzSCADA-windows-x64.exe 2>/dev/null || true
          # Also capture the separate NSIS installer if built
          find . -maxdepth 1 -name 'DreamzSCADA-*-Setup.exe' -exec mv {} artifacts/ \;
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ] && [ "${{ matrix.arch }}" = "x64" ]; then
          mv dist/*.AppImage artifacts/DreamzSCADA-linux-x64.AppImage
        elif [ "${{ matrix.os }}" = "ubuntu-24.04-arm" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
          mv dist/*.AppImage artifacts/DreamzSCADA-linux-arm64.AppImage
        elif [ "${{ matrix.os }}" = "macos-latest" ] && [ "${{ matrix.arch }}" = "x64" ]; then
          mv dist/*.dmg artifacts/DreamzSCADA-macos-x64.dmg
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          mv dist/*.dmg artifacts/DreamzSCADA-macos-arm64.dmg
        fi
      working-directory: ./app/electron
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DreamzSCADA-${{ matrix.os }}-${{ matrix.arch }}
        path: app/electron/artifacts/*